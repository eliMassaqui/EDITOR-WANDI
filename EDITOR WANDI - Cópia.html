<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroServo - Rotação Lateral Suave</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        // 1. Configurações Iniciais
        const CAMERA_INICIAL = { x: 130.1, y: 109.39, z: -55.82, fov: 53 };
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1d1d1);

        const camera = new THREE.PerspectiveCamera(CAMERA_INICIAL.fov, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(CAMERA_INICIAL.x, CAMERA_INICIAL.y, CAMERA_INICIAL.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. Iluminação
        scene.add(new THREE.AmbientLight(0xffffff, 0.82));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.43);
        dirLight.position.set(50, 100, 75);
        scene.add(dirLight);

        scene.add(new THREE.GridHelper(200, 20), new THREE.AxesHelper(100));

        const gui = new GUI({ title: '🕹️ Controle do MicroServo' });
        
        // Variáveis para animação do Separator
        let separatorPivot = null;
        const servoSettings = {
            animar: true,
            velocidade: 2.5,
            amplitude: 1.2 // Radianos (~70 graus)
        };

        const loader = new GLTFLoader();
        loader.load('MicroServo.glb', (gltf) => {
            const model = gltf.scene;
            model.position.set(-65.6, -21.2, 23.2);
            model.scale.setScalar(1.7226);
            scene.add(model);

            const partsFolder = gui.addFolder('🔧 Peças Individuais');
            const meshes = [];

            model.traverse((node) => {
                if (node.isMesh) meshes.push(node);
            });

            meshes.forEach((child) => {
                const box = new THREE.Box3().setFromObject(child);
                const center = new THREE.Vector3();
                box.getCenter(center);

                const pivot = new THREE.Group();
                pivot.name = "Pivot_" + child.name;
                pivot.position.copy(center);
                child.parent.add(pivot);

                child.position.sub(center);
                pivot.add(child);

                // --- IDENTIFICAÇÃO DA PEÇA ---
                if (child.name === "Separator") {
                    separatorPivot = pivot;
                }

                const pFolder = partsFolder.addFolder(child.name || "Peça");
                pFolder.add(pivot.rotation, 'y', -Math.PI, Math.PI).name('Girar Y (Manual)').listen();
                pFolder.add(child, 'visible').name('Visível');
                pFolder.close();
            });

            // Controle da Animação Automática
            const animFolder = gui.addFolder('🎬 Movimento Automático');
            animFolder.add(servoSettings, 'animar').name('Ativar Servo');
            animFolder.add(servoSettings, 'velocidade', 0.1, 10).name('Velocidade');
            animFolder.add(servoSettings, 'amplitude', 0.1, Math.PI).name('Amplitude (Rad)');
        });

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. Loop de Animação
        function animate() {
            requestAnimationFrame(animate);

            // LOGICA DE MOVIMENTO DE LADO (EIXO Y)
            if (separatorPivot && servoSettings.animar) {
                const tempo = Date.now() * 0.001 * servoSettings.velocidade;
                // Aplica a oscilação suave no eixo Y do pivô
                separatorPivot.rotation.y = Math.sin(tempo) * servoSettings.amplitude;
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
